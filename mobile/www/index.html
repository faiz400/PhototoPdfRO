<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>RO Audit Photo Collection</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, Arial, sans-serif; max-width: 640px; margin: 0 auto 90px; padding: 0 16px; background: #fafafa; }
  h1 { font-size: 18px; }
  header { position: sticky; top: 0; background: #fafafa; padding: 14px 0 8px; border-bottom: 1px solid #ddd; z-index: 10; }
  header p { margin: 2px 0 0; font-size: 12px; color: #666; }
  label { display: block; margin-top: 14px; font-weight: 600; font-size: 14px; }
  input { width: 100%; padding: 9px; margin-top: 4px; font-size: 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
  button { margin-top: 14px; width: 100%; padding: 13px; font-size: 16px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; }
  button:disabled { background: #aaa; }
  button.secondary { background: #fff; color: #1a73e8; border: 1px solid #1a73e8; }
  .question { border: 1px solid #ddd; border-radius: 8px; padding: 14px; margin-top: 16px; background: #fff; }
  .question h2 { font-size: 15px; margin: 0 0 8px; }
  .thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .thumb { position: relative; width: 80px; height: 80px; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; border: 1px solid #ccc; }
  .thumb button { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; border-radius: 50%; background: #d33; color: #fff; border: none; font-size: 13px; line-height: 1; cursor: pointer; padding: 0; margin: 0; }
  .row { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .row label { font-size: 13px; display: flex; align-items: center; gap: 4px; font-weight: normal; margin: 0; }
  .skip-card { opacity: 0.55; }
  .status { font-size: 12px; color: #666; margin-top: 6px; }
  footer { position: fixed; bottom: 0; left: 0; right: 0; background: #fafafa; border-top: 1px solid #ddd; padding: 10px 16px; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
  footer .row { margin-top: 0; }
  #result { text-align: center; margin-top: 30px; }
  #result a, #result button { display: inline-block; margin-top: 10px; padding: 12px 20px; background: #188038; color: #fff; border-radius: 6px; text-decoration: none; width: auto; }
  .screen { display: none; }
  .screen.active { display: block; }
  .progress-wrap { margin-top: 8px; }
  .progress-bar { height: 8px; border-radius: 4px; background: #e0e0e0; overflow: hidden; }
  .progress-bar-fill { height: 100%; width: 0%; background: #1a73e8; border-radius: 4px; transition: width 0.15s ease; }
  .progress-label { font-size: 11px; color: #666; margin-top: 3px; }
  #genOverlay {
    display: none; position: fixed; inset: 0; background: rgba(250,250,250,0.95);
    z-index: 50; align-items: center; justify-content: center;
  }
  #genOverlay .box { width: 260px; text-align: center; }
  #genOverlay p { font-size: 13px; color: #333; margin-top: 12px; }
  .version { margin: 26px 0 10px; text-align: center; font-size: 11px; color: #999; }
  .offline-badge { display: inline-block; font-size: 11px; background: #e6f4ea; color: #188038; border-radius: 10px; padding: 2px 8px; margin-top: 6px; }
</style>
</head>
<body>

<!-- ============ START SCREEN ============ -->
<div id="screenStart" class="screen active">
  <h1 style="margin-top:18px;">Start RO Audit Photo Session</h1>
  <div class="offline-badge">Works fully offline &mdash; nothing leaves this device until you share the PDF</div>
  <p style="font-size:13px;color:#666;">Fill in audit details, then proceed to upload photos against each checklist item.</p>
  <label>Retail Outlet Name<input id="roName" /></label>
  <label>RO Code<input id="roCode" /></label>
  <label>Auditor Name<input id="auditor" /></label>
  <label>Audit Date<input id="auditDate" type="date" /></label>
  <button id="startBtn">Start Audit</button>
  <button id="resumeBtn" class="secondary" style="display:none;">Resume In-Progress Audit</button>
  <div class="version" id="versionTag"></div>
</div>

<!-- ============ AUDIT SCREEN ============ -->
<div id="screenAudit" class="screen">
  <header>
    <h1 id="roTitle">-</h1>
    <p id="roSub"></p>
  </header>

  <div id="questions"></div>

  <div id="result" style="display:none;"></div>

  <footer id="auditFooter">
    <div class="row">
      <button id="submitBtn">Submit &amp; Generate PDF</button>
    </div>
  </footer>
</div>

<div id="genOverlay">
  <div class="box">
    <div class="progress-bar"><div class="progress-bar-fill" id="genFill"></div></div>
    <p id="genLabel">Generating PDF report&hellip; please don&apos;t close the app.</p>
  </div>
</div>

<script src="lib/pdf-lib.min.js"></script>
<script src="app.js"></script>
</body>
</html>
