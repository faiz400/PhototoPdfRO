<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>GPS Map Camera</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, Arial, sans-serif; max-width: 640px; margin: 0 auto 90px; padding: 0 16px; background: #111; color: #eee; }
  h1 { font-size: 18px; margin: 18px 0 4px; }
  .subtitle { font-size: 12px; color: #999; margin-bottom: 16px; }
  button { width: 100%; padding: 16px; font-size: 16px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
  button:disabled { background: #555; }
  button.secondary { background: #2a2a2a; color: #ccc; }
  .status-row { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-top: 14px; padding: 10px 12px; background: #1c1c1c; border-radius: 8px; }
  .status-row span.ok { color: #4caf50; }
  .status-row span.bad { color: #e57373; }
  .gallery { margin-top: 18px; }
  .shot { position: relative; border-radius: 8px; overflow: hidden; margin-bottom: 14px; background: #1c1c1c; }
  .shot img { width: 100%; display: block; }
  .shot .meta { padding: 8px 10px; font-size: 12px; color: #ccc; }
  .shot .actions { display: flex; gap: 8px; padding: 0 10px 10px; }
  .shot .actions button { margin-top: 0; padding: 8px; font-size: 13px; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 50; align-items: center; justify-content: center; }
  .overlay.active { display: flex; }
  .overlay .box { width: 260px; text-align: center; }
  .progress-bar { height: 8px; border-radius: 4px; background: #333; overflow: hidden; }
  .progress-bar-fill { height: 100%; width: 40%; background: #1a73e8; border-radius: 4px; animation: indeterminate 1.1s infinite ease-in-out; }
  @keyframes indeterminate { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
  .overlay p { font-size: 13px; color: #ddd; margin-top: 12px; }
  .version { margin-top: 26px; text-align: center; font-size: 11px; color: #666; }
</style>
</head>
<body>
  <h1>GPS Map Camera</h1>
  <div class="subtitle">Stamps each photo with timestamp, address, coordinates, and a small map. Downscales to ~8MP and compresses automatically.</div>

  <div class="status-row">
    <span>Location:</span>
    <span id="locStatus">checking…</span>
  </div>

  <button id="captureBtn">Take Photo</button>
  <button id="pickBtn" class="secondary">Stamp a Photo from Gallery</button>

  <div class="gallery" id="gallery"></div>

  <div class="version" id="versionTag"></div>

  <div class="overlay" id="busyOverlay">
    <div class="box">
      <div class="progress-bar"><div class="progress-bar-fill"></div></div>
      <p id="busyLabel">Working…</p>
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
